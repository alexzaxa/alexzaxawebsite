<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Alex Zaxa Website Creation</title>
  <desc id="desc">Premium dark preview card for modern websites for local Greek businesses.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07101d"/><stop offset="1" stop-color="#050811"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#55d8ff"/><stop offset="1" stop-color="#37e1ac"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="18" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="80" r="260" fill="#55d8ff" opacity=".12" filter="url(#glow)"/>
